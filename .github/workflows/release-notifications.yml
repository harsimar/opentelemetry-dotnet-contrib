name: Release Notifications

on:
  schedule:
    - cron: '0 * * * *' # Every hour
  workflow_dispatch: # Manual trigger for testing

concurrency:
  group: release-notifications
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  check-releases:
    runs-on: ubuntu-latest
    if: github.repository_owner != 'open-telemetry' # Only run on forks
    steps:
      - name: Check for new releases and notify
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          STATE_BRANCH="release-notify-state"
          STATE_FILE="release-notify-watermark.json"
          LOOKBACK_HOURS=24

          # ── Helper: fetch watermark state from the dedicated branch ──
          fetch_state() {
            local state
            state=$(gh api \
              -H "Accept: application/vnd.github.raw+json" \
              "repos/${{ github.repository }}/contents/${STATE_FILE}?ref=${STATE_BRANCH}" \
              2>/dev/null) || echo '{}'
            echo "$state"
          }

          # ── Helper: save watermark state to the dedicated branch ──
          save_state() {
            local new_state="$1"
            local sha=""

            sha=$(gh api \
              "repos/${{ github.repository }}/contents/${STATE_FILE}?ref=${STATE_BRANCH}" \
              --jq '.sha' 2>/dev/null) || true

            local encoded
            encoded=$(echo -n "$new_state" | base64 -w 0)

            local body
            if [ -n "$sha" ]; then
              body=$(jq -n \
                --arg msg "Update release notification watermark" \
                --arg content "$encoded" \
                --arg branch "$STATE_BRANCH" \
                --arg sha "$sha" \
                '{message: $msg, content: $content, branch: $branch, sha: $sha}')
            else
              body=$(jq -n \
                --arg msg "Initialize release notification watermark" \
                --arg content "$encoded" \
                --arg branch "$STATE_BRANCH" \
                '{message: $msg, content: $content, branch: $branch}')
            fi

            gh api \
              -X PUT \
              "repos/${{ github.repository }}/contents/${STATE_FILE}" \
              --input - <<< "$body"
          }

          # ── Helper: ensure state branch exists ──
          ensure_branch() {
            if ! gh api "repos/${{ github.repository }}/git/ref/heads/${STATE_BRANCH}" &>/dev/null; then
              echo "Creating state branch: ${STATE_BRANCH}"
              local default_sha
              default_sha=$(gh api "repos/${{ github.repository }}/git/ref/heads/${{ github.event.repository.default_branch }}" --jq '.object.sha')
              gh api -X POST "repos/${{ github.repository }}/git/refs" \
                -f "ref=refs/heads/${STATE_BRANCH}" \
                -f "sha=${default_sha}"
            fi
          }

          # ── Helper: create a GitHub issue to notify about a release ──
          notify_via_issue() {
            local repo="$1" tag="$2" url="$3" published="$4"

            local owner
            owner=$(echo "${{ github.repository }}" | cut -d'/' -f1)

            local title="🚀 New Release: ${tag}"
            local body="@${owner} A new release was published that matches your watch list.

          | Field | Value |
          |-------|-------|
          | **Repository** | [${repo}](https://github.com/${repo}) |
          | **Tag** | \`${tag}\` |
          | **Published** | ${published} |
          | **Release** | [View on GitHub](${url}) |"

            local issue_number
            issue_number=$(gh api \
              -X POST \
              "repos/${{ github.repository }}/issues" \
              -f "title=${title}" \
              -f "body=${body}" \
              -f "labels[]=release-notification" \
              --jq '.number')

            echo "  ✅ Issue #${issue_number} created for ${tag}"
          }

          # ── Configuration: repos and tag patterns to watch ──
          declare -A REPO_PATTERNS
          REPO_PATTERNS["open-telemetry/opentelemetry-dotnet"]="core-"
          REPO_PATTERNS["open-telemetry/opentelemetry-dotnet-contrib"]="Instrumentation.Runtime-|Instrumentation.Http-|Instrumentation.AspNetCore-|Exporter.Geneva-|Exporter.OneCollector-"

          # ── Ensure the release-notification label exists ──
          gh api "repos/${{ github.repository }}/labels" \
            --jq '.[].name' 2>/dev/null | grep -q '^release-notification$' || \
            gh api -X POST "repos/${{ github.repository }}/labels" \
              -f "name=release-notification" \
              -f "color=0e8a16" \
              -f "description=Automated release notification" > /dev/null 2>&1 || true

          # ── Main logic ──
          ensure_branch
          STATE=$(fetch_state)
          NEW_STATE="$STATE"
          CUTOFF=$(date -u -d "${LOOKBACK_HOURS} hours ago" +%Y-%m-%dT%H:%M:%SZ)
          NOTIFIED=0

          for REPO in "${!REPO_PATTERNS[@]}"; do
            echo "Checking ${REPO}..."
            PATTERNS="${REPO_PATTERNS[$REPO]}"

            WATERMARK=$(echo "$STATE" | jq -r --arg repo "$REPO" '.[$repo] // ""')
            EFFECTIVE_CUTOFF="$CUTOFF"
            if [ -n "$WATERMARK" ] && [[ "$WATERMARK" > "$CUTOFF" ]]; then
              EFFECTIVE_CUTOFF="$WATERMARK"
            fi

            RELEASES=$(gh api "repos/${REPO}/releases?per_page=100" \
              --jq "[.[] | select(.draft == false and .prerelease == false and .published_at > \"${EFFECTIVE_CUTOFF}\")]")

            COUNT=$(echo "$RELEASES" | jq 'length')
            echo "  Found ${COUNT} release(s) since ${EFFECTIVE_CUTOFF}"

            LATEST_PUBLISHED="$WATERMARK"

            for i in $(seq 0 $((COUNT - 1))); do
              RELEASE=$(echo "$RELEASES" | jq -c ".[$i]")
              TAG=$(echo "$RELEASE" | jq -r '.tag_name')
              URL=$(echo "$RELEASE" | jq -r '.html_url')
              PUBLISHED=$(echo "$RELEASE" | jq -r '.published_at')

              MATCH=false
              IFS='|' read -ra PREFIXES <<< "$PATTERNS"
              for PREFIX in "${PREFIXES[@]}"; do
                if [[ "$TAG" == ${PREFIX}* ]]; then
                  MATCH=true
                  break
                fi
              done

              if [ "$MATCH" = true ]; then
                echo "  📦 New release: ${TAG} (${PUBLISHED})"
                notify_via_issue "$REPO" "$TAG" "$URL" "$PUBLISHED"
                NOTIFIED=$((NOTIFIED + 1))

                if [ -z "$LATEST_PUBLISHED" ] || [[ "$PUBLISHED" > "$LATEST_PUBLISHED" ]]; then
                  LATEST_PUBLISHED="$PUBLISHED"
                fi
              fi
            done

            if [ -n "$LATEST_PUBLISHED" ] && [ "$LATEST_PUBLISHED" != "$WATERMARK" ]; then
              NEW_STATE=$(echo "$NEW_STATE" | jq --arg repo "$REPO" --arg ts "$LATEST_PUBLISHED" '. + {($repo): $ts}')
            fi
          done

          if [ "$NEW_STATE" != "$STATE" ]; then
            echo "Updating watermark state..."
            save_state "$NEW_STATE"
          fi

          echo "Done. Notified about ${NOTIFIED} new release(s)."
